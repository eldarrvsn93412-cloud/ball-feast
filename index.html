<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>EmojiBall Arena</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:#111; font-family: 'Segoe UI', sans-serif; touch-action:none; user-select:none; }
#gameCanvas { display:block; position:absolute; top:0; left:0; }

/* ===== SCREENS ===== */
.screen { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100; }
.screen.hidden { display:none; }

/* MENU */
#menuScreen { background: radial-gradient(ellipse at 50% 30%, #1a2a4a 0%, #0a0a1a 100%); }
.menu-title { font-size: clamp(2rem,8vw,4rem); font-weight:900; color:#fff; text-shadow:0 0 30px #4af,0 0 60px #48f; margin-bottom:8px; letter-spacing:2px; }
.menu-subtitle { font-size:clamp(0.9rem,3vw,1.2rem); color:#8af; margin-bottom:32px; }
.emoji-preview { font-size:80px; margin-bottom:24px; animation: float 2s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0) rotate(-5deg)} 50%{transform:translateY(-12px) rotate(5deg)} }

/* Customization */
.custom-section { background:rgba(255,255,255,0.06); border-radius:16px; padding:16px 24px; margin-bottom:20px; width:min(360px,90vw); }
.custom-label { color:#aaa; font-size:0.8rem; text-transform:uppercase; letter-spacing:1px; margin-bottom:10px; }
.emoji-grid { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; }
.emoji-opt { font-size:1.8rem; cursor:pointer; padding:6px; border-radius:10px; border:2px solid transparent; transition:all 0.15s; }
.emoji-opt.selected { border-color:#4af; background:rgba(64,170,255,0.2); }
.color-grid { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; }
.color-opt { width:32px; height:32px; border-radius:50%; cursor:pointer; border:3px solid transparent; transition:all 0.15s; }
.color-opt.selected { border-color:#fff; transform:scale(1.2); }

.btn { padding:14px 36px; font-size:1.1rem; font-weight:700; border:none; border-radius:50px; cursor:pointer; transition:all 0.15s; margin:6px; min-width:160px; }
.btn-primary { background:linear-gradient(135deg,#4af,#48f); color:#fff; box-shadow:0 4px 20px rgba(64,170,255,0.4); }
.btn-primary:active { transform:scale(0.96); }
.btn-secondary { background:rgba(255,255,255,0.12); color:#fff; border:1px solid rgba(255,255,255,0.2); }
.btn-secondary:active { transform:scale(0.96); background:rgba(255,255,255,0.2); }
.btn-danger { background:linear-gradient(135deg,#f44,#c22); color:#fff; }

/* HUD */
#hud { position:absolute; top:0; left:0; right:0; z-index:50; pointer-events:none; }
#hud-bar { display:flex; align-items:center; padding:10px 16px; gap:12px; background:rgba(0,0,0,0.4); backdrop-filter:blur(4px); }
.hud-item { display:flex; align-items:center; gap:6px; color:#fff; font-size:0.9rem; font-weight:600; }
.hud-icon { font-size:1.1rem; }
#skill-bar { display:flex; gap:8px; padding:8px 16px; }
.skill-btn { background:rgba(255,255,255,0.15); border:2px solid rgba(255,255,255,0.3); border-radius:10px; padding:6px 12px; color:#fff; font-size:0.8rem; font-weight:700; cursor:pointer; pointer-events:all; transition:all 0.15s; min-width:60px; text-align:center; }
.skill-btn:active { transform:scale(0.92); background:rgba(255,255,255,0.3); }
.skill-btn.ready { border-color:#4f4; color:#4f4; }
.skill-btn.cooldown { opacity:0.5; color:#aaa; }
#combo-display { position:absolute; top:110px; left:50%; transform:translateX(-50%); z-index:51; pointer-events:none; text-align:center; }
.combo-text { font-size:2rem; font-weight:900; color:#ff0; text-shadow:0 0 20px #f80; opacity:0; transition:opacity 0.3s; }
.combo-text.show { opacity:1; }

/* SKILL PICKER */
#skillPicker { position:absolute; inset:0; z-index:200; background:rgba(0,0,0,0.85); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; }
#skillPicker.hidden { display:none; }
.picker-title { color:#fff; font-size:1.4rem; font-weight:700; margin-bottom:8px; }
.skill-choice { background:rgba(255,255,255,0.1); border:2px solid rgba(255,255,255,0.2); border-radius:16px; padding:16px 24px; width:min(320px,85vw); cursor:pointer; color:#fff; transition:all 0.15s; }
.skill-choice:active { transform:scale(0.97); background:rgba(255,255,255,0.2); border-color:#4af; }
.skill-choice h3 { font-size:1rem; margin-bottom:4px; }
.skill-choice p { font-size:0.8rem; color:#aaa; }

/* DEATH SCREEN */
#deathScreen { background:rgba(0,0,0,0.9); }
.death-title { font-size:clamp(2rem,8vw,3.5rem); font-weight:900; color:#f44; text-shadow:0 0 30px #f00; margin-bottom:16px; }
.death-stats { color:#ccc; font-size:1rem; margin-bottom:32px; text-align:center; line-height:2; }

/* SETTINGS */
#settingsScreen { background:rgba(0,0,0,0.95); }
.settings-title { color:#fff; font-size:1.6rem; font-weight:700; margin-bottom:24px; }
.setting-row { display:flex; align-items:center; justify-content:space-between; width:min(300px,85vw); margin-bottom:16px; color:#ccc; font-size:1rem; }
.toggle { width:52px; height:28px; border-radius:14px; background:#444; cursor:pointer; position:relative; transition:background 0.2s; }
.toggle.on { background:#4af; }
.toggle::after { content:''; position:absolute; width:22px; height:22px; border-radius:50%; background:#fff; top:3px; left:3px; transition:left 0.2s; }
.toggle.on::after { left:27px; }

/* EVENT BANNER */
#eventBanner { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); z-index:60; pointer-events:none; text-align:center; opacity:0; transition:opacity 0.4s; }
#eventBanner.show { opacity:1; }
.event-text { font-size:clamp(1.2rem,5vw,2rem); font-weight:900; color:#ff0; text-shadow:0 0 20px #f80, 0 0 40px #f80; padding:12px 24px; background:rgba(0,0,0,0.6); border-radius:12px; }

/* JOYSTICK */
#joystick-outer { position:absolute; width:110px; height:110px; border-radius:50%; background:rgba(255,255,255,0.12); border:2px solid rgba(255,255,255,0.25); pointer-events:none; display:none; z-index:40; transform:translate(-50%,-50%); }
#joystick-inner { position:absolute; width:48px; height:48px; border-radius:50%; background:rgba(255,255,255,0.35); top:50%; left:50%; transform:translate(-50%,-50%); }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<!-- JOYSTICK -->
<div id="joystick-outer"><div id="joystick-inner"></div></div>

<!-- HUD -->
<div id="hud" class="hidden">
  <div id="hud-bar">
    <div class="hud-item"><span class="hud-icon">⚽</span><span id="hud-size">1.0</span></div>
    <div class="hud-item"><span class="hud-icon">🍬</span><span id="hud-dots">0</span></div>
    <div class="hud-item"><span class="hud-icon">🏆</span><span id="hud-rank">#1</span></div>
    <div class="hud-item" id="hud-active-bonus" style="display:none;"><span id="active-bonus-text"></span></div>
    <div class="hud-item" style="margin-left:auto;"><span class="hud-icon">⏱</span><span id="hud-time">0</span></div>
  </div>
  <div id="skill-bar">
    <button class="skill-btn" id="sk0" onclick="activateSkill(0)">-</button>
    <button class="skill-btn" id="sk1" onclick="activateSkill(1)">-</button>
    <button class="skill-btn" id="sk2" onclick="activateSkill(2)">-</button>
  </div>
  <div id="combo-display"><div class="combo-text" id="combo-text">COMBO ×3!</div></div>
</div>

<!-- EVENT BANNER -->
<div id="eventBanner"><div class="event-text" id="eventText"></div></div>

<!-- SKILL PICKER -->
<div id="skillPicker" class="hidden">
  <div class="picker-title">🌟 Выбери улучшение!</div>
  <div id="skill-choices"></div>
</div>

<!-- MENU -->
<div id="menuScreen" class="screen">
  <div class="emoji-preview" id="menuEmoji">😊</div>
  <div class="menu-title">EmojiBall</div>
  <div class="menu-subtitle">Арена смайликов</div>
  <div class="custom-section">
    <div class="custom-label">Смайлик</div>
    <div class="emoji-grid" id="emojiGrid"></div>
  </div>
  <div class="custom-section">
    <div class="custom-label">Цвет шара</div>
    <div class="color-grid" id="colorGrid"></div>
  </div>
  <button class="btn btn-primary" onclick="startGame()">▶ ИГРАТЬ</button>
  <button class="btn btn-secondary" onclick="showSettings()">⚙ Настройки</button>
</div>

<!-- DEATH SCREEN -->
<div id="deathScreen" class="screen hidden">
  <div class="death-title">💀 КОНЕЦ!</div>
  <div class="death-stats" id="deathStats"></div>
  <button class="btn btn-primary" onclick="startGame()">🔄 Снова</button>
  <button class="btn btn-secondary" onclick="showMenu()">🏠 Меню</button>
</div>

<!-- SETTINGS -->
<div id="settingsScreen" class="screen hidden">
  <div class="settings-title">⚙ Настройки</div>
  <div class="setting-row">
    <span>Звуки</span>
    <div class="toggle on" id="toggleSound" onclick="toggleSetting('sound')"></div>
  </div>
  <div class="setting-row">
    <span>Музыка</span>
    <div class="toggle on" id="toggleMusic" onclick="toggleSetting('music')"></div>
  </div>
  <button class="btn btn-secondary" onclick="hideSettings()">← Назад</button>
</div>

<script>
// ===================== AUDIO =====================
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let actx = null;
function getAC() { if (!actx) actx = new AudioCtx(); return actx; }

const settings = { sound: true, music: true };

function playBeep(freq, dur, type='sine', vol=0.3, decay=0.8) {
  if (!settings.sound) return;
  try {
    const ac = getAC();
    const o = ac.createOscillator(), g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    o.start(); o.stop(ac.currentTime + dur);
  } catch(e){}
}
function playSfx(type) {
  if (!settings.sound) return;
  if (type==='eat') { playBeep(520,0.08,'triangle',0.3); setTimeout(()=>playBeep(740,0.1,'triangle',0.25),60); }
  else if (type==='eatAI') { playBeep(300,0.15,'sawtooth',0.3); setTimeout(()=>playBeep(500,0.2,'sine',0.3),80); setTimeout(()=>playBeep(700,0.15,'sine',0.2),180); }
  else if (type==='die') { playBeep(400,0.2,'sawtooth',0.4); setTimeout(()=>playBeep(300,0.2,'sawtooth',0.35),150); setTimeout(()=>playBeep(200,0.4,'sawtooth',0.3),300); }
  else if (type==='bonus') { playBeep(660,0.1,'sine',0.3); setTimeout(()=>playBeep(880,0.1,'sine',0.25),80); setTimeout(()=>playBeep(1100,0.15,'sine',0.2),160); }
  else if (type==='levelup') { [440,550,660,880].forEach((f,i)=>setTimeout(()=>playBeep(f,0.15,'sine',0.3),i*80)); }
  else if (type==='skill') { playBeep(800,0.05,'square',0.2); setTimeout(()=>playBeep(1200,0.15,'sine',0.25),50); }
  else if (type==='meteor') { playBeep(150,0.3,'sawtooth',0.4); setTimeout(()=>playBeep(100,0.4,'sawtooth',0.35),200); }
  else if (type==='boss') { [200,250,200,150].forEach((f,i)=>setTimeout(()=>playBeep(f,0.2,'sawtooth',0.4),i*120)); }
  else if (type==='combo') { playBeep(880,0.05,'square',0.3); setTimeout(()=>playBeep(1100,0.05,'square',0.3),60); setTimeout(()=>playBeep(1320,0.15,'sine',0.35),120); }
}

// bg music
let bgNodes = [];
function startMusic() {
  if (!settings.music) return;
  stopMusic();
  const ac = getAC();
  const notes = [261,294,330,349,392,440,494,523];
  function playNote() {
    if (!settings.music) return;
    try {
      const o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = 'sine';
      o.frequency.value = notes[Math.floor(Math.random()*notes.length)];
      g.gain.setValueAtTime(0, ac.currentTime);
      g.gain.linearRampToValueAtTime(0.04, ac.currentTime+0.1);
      g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+0.7);
      o.start(); o.stop(ac.currentTime+0.8);
    } catch(e){}
  }
  bgNodes.push(setInterval(playNote, 600));
}
function stopMusic() { bgNodes.forEach(clearInterval); bgNodes=[]; }

function toggleSetting(s) {
  settings[s] = !settings[s];
  document.getElementById('toggle'+s.charAt(0).toUpperCase()+s.slice(1)).classList.toggle('on', settings[s]);
  if (s==='music') { if (settings.music && gameRunning) startMusic(); else stopMusic(); }
}
function showSettings() { show('settingsScreen'); hide('menuScreen'); }
function hideSettings() { hide('settingsScreen'); show('menuScreen'); }

// ===================== CUSTOMIZATION =====================
const EMOJIS = ['😊','😎','🤩','😈','👾','🐱','🦊','🐸','🤖','👻','💀','🎃','🌟','🔥','⚡'];
const COLORS = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff922b','#cc5de8','#f06595','#74c0fc','#a9e34b','#ff8787'];
let selEmoji = 0, selColor = 0;

function buildMenuSelectors() {
  const eg = document.getElementById('emojiGrid');
  eg.innerHTML = '';
  EMOJIS.forEach((e,i)=>{
    const d = document.createElement('div');
    d.className = 'emoji-opt' + (i===selEmoji?' selected':'');
    d.textContent = e;
    d.onclick = ()=>{ selEmoji=i; buildMenuSelectors(); document.getElementById('menuEmoji').textContent=EMOJIS[i]; };
    eg.appendChild(d);
  });
  const cg = document.getElementById('colorGrid');
  cg.innerHTML = '';
  COLORS.forEach((c,i)=>{
    const d = document.createElement('div');
    d.className = 'color-opt' + (i===selColor?' selected':'');
    d.style.background = c;
    d.onclick = ()=>{ selColor=i; buildMenuSelectors(); };
    cg.appendChild(d);
  });
}
buildMenuSelectors();

// ===================== SCREENS =====================
function show(id) { document.getElementById(id).classList.remove('hidden'); }
function hide(id) { document.getElementById(id).classList.add('hidden'); }
function showMenu() { stopGame(); show('menuScreen'); hide('deathScreen'); hide('hud'); buildMenuSelectors(); }

// ===================== GAME =====================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const MAP_W = 3200, MAP_H = 3200;
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ---- PLANET AI NAMES ----
const PLANET_NAMES = ['Меркурий','Венера','Марс','Юпитер','Сатурн','Уран','Нептун','Плутон','Кеплер','Гаймед','Титан','Каллисто','Европа','Ганимед'];
const AI_COLORS = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff922b','#cc5de8','#f06595','#74c0fc','#a9e34b','#ff8787','#f8f9fa','#e64980','#37b24d','#1971c2'];
const AI_EMOJIS = ['😈','👾','🤖','👻','🐱','🦊','🐸','💀','🎃','😎','🤩','🔥','⚡','🌟'];

// ---- SKILLS ----
const SKILL_DEFS = [
  {id:'speed', name:'Ускорение', desc:'Скорость +50% на 8 сек', icon:'⚡', dur:8000},
  {id:'shield', name:'Щит', desc:'Неуязвимость 5 сек', icon:'🛡', dur:5000},
  {id:'wave', name:'Ударная волна', desc:'Отталкивает ближних AI', icon:'💥', dur:0},
  {id:'tele', name:'Телепорт', desc:'Случайное место на карте', icon:'🌀', dur:0},
  {id:'magnet', name:'Магнит', desc:'Притягивает шарики 10 сек', icon:'🧲', dur:10000},
];

// ---- BONUS TYPES ----
const BONUS_TYPES = [
  {id:'speed', icon:'⚡', color:'#ffd93d', name:'Ускорение'},
  {id:'magnet', icon:'🧲', color:'#74c0fc', name:'Магнит'},
  {id:'ghost', icon:'👻', color:'#cc5de8', name:'Невидимость'},
  {id:'rainbow', icon:'🌈', color:'#ff6b6b', name:'Радуга'},
];

let gameRunning = false;
let player, dots, aiPlayers, bonuses, particles, meteorites;
let cam, gameTime, bossTimer, eventTimer, comboCount, comboTimer, lastEatTime;
let activeBonus, activeBonusTimer, activeBonusName;
let playerSkills, skillCooldowns, pendingSkillPick;

function rnd(a,b){return a+Math.random()*(b-a);}
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}

function makeParticle(x,y,color,count=8,speed=4) {
  for(let i=0;i<count;i++) {
    const ang = Math.random()*Math.PI*2, spd=rnd(1,speed);
    particles.push({x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,r:rnd(3,8),color,life:1,maxLife:rnd(0.5,1)});
  }
}

function radiusFromMass(mass) { return 16 + Math.sqrt(mass) * 6; }

function initGame() {
  gameRunning = true;
  gameTime = 0;
  bossTimer = 0;
  eventTimer = rnd(15,30)*1000;
  comboCount = 0;
  comboTimer = 0;
  activeBonus = null;
  activeBonusTimer = 0;
  playerSkills = [];
  skillCooldowns = [0,0,0];
  pendingSkillPick = false;
  particles = [];
  meteorites = [];

  player = {
    x: MAP_W/2, y: MAP_H/2,
    mass: 1, angle: 0,
    emoji: EMOJIS[selEmoji],
    color: COLORS[selColor],
    dotsEaten: 0,
    aiEaten: 0,
    speed: 3.5,
    shielded: false,
    ghost: false,
    rainbow: false,
    magnetOn: false,
    eatingScale: 1,
    deadAnim: 0,
    alive: true
  };

  // DOTS
  dots = [];
  for(let i=0;i<600;i++) spawnDot();

  // AI
  aiPlayers = [];
  for(let i=0;i<14;i++) spawnAI(i);

  // BONUSES
  bonuses = [];
  for(let i=0;i<8;i++) spawnBonus();

  cam = {x:0,y:0};

  updateSkillBar();
}

function spawnDot() {
  dots.push({
    x: rnd(60,MAP_W-60), y: rnd(60,MAP_H-60),
    r: rnd(5,10),
    color: `hsl(${Math.random()*360},80%,65%)`,
    pulse: Math.random()*Math.PI*2
  });
}

function spawnAI(idx, isBoss=false) {
  const farX = Math.random() < 0.5 ? rnd(50,400) : rnd(MAP_W-400,MAP_W-50);
  const farY = Math.random() < 0.5 ? rnd(50,400) : rnd(MAP_H-400,MAP_H-50);
  const mass = isBoss ? player.mass * rnd(1.3,1.7) : rnd(0.3,3.5);
  aiPlayers.push({
    x: farX, y: farY,
    mass: mass,
    angle: 0,
    emoji: isBoss ? '👿' : AI_EMOJIS[idx%AI_EMOJIS.length],
    color: isBoss ? '#ff4444' : AI_COLORS[idx%AI_COLORS.length],
    name: isBoss ? '👿 БОСС' : PLANET_NAMES[idx%PLANET_NAMES.length],
    isBoss: isBoss,
    vx: rnd(-1,1), vy: rnd(-1,1),
    targetX: rnd(100,MAP_W-100), targetY: rnd(100,MAP_H-100),
    thinkTimer: 0,
    eatingScale: 1,
    alive: true
  });
}

function spawnBonus() {
  const bt = BONUS_TYPES[Math.floor(Math.random()*BONUS_TYPES.length)];
  bonuses.push({
    x: rnd(100,MAP_W-100), y: rnd(100,MAP_H-100),
    type: bt.id, icon: bt.icon, color: bt.color, name: bt.name,
    pulse: Math.random()*Math.PI*2,
    r: 18
  });
}

// ---- INPUT ----
let joyActive = false, joyX=0, joyY=0, joyStartX=0, joyStartY=0;
let joyOuter = document.getElementById('joystick-outer');
let joyInner = document.getElementById('joystick-inner');
let moveDir = {x:0, y:0};

// Touch
canvas.addEventListener('touchstart', e=>{
  e.preventDefault();
  const t = e.changedTouches[0];
  joyActive = true;
  joyStartX = t.clientX;
  joyStartY = t.clientY;
  joyX = 0; joyY = 0;
  joyOuter.style.display = 'block';
  joyOuter.style.left = t.clientX+'px';
  joyOuter.style.top = t.clientY+'px';
  joyInner.style.left = '50%'; joyInner.style.top = '50%';
}, {passive:false});

canvas.addEventListener('touchmove', e=>{
  e.preventDefault();
  if (!joyActive) return;
  const t = e.changedTouches[0];
  const dx = t.clientX - joyStartX, dy = t.clientY - joyStartY;
  const maxR = 45;
  const d = Math.hypot(dx,dy);
  const nx = d>maxR ? dx/d*maxR : dx;
  const ny = d>maxR ? dy/d*maxR : dy;
  joyX = nx/maxR; joyY = ny/maxR;
  joyInner.style.left = (50+nx/maxR*50)+'%';
  joyInner.style.top = (50+ny/maxR*50)+'%';
  moveDir = {x:joyX, y:joyY};
}, {passive:false});

canvas.addEventListener('touchend', e=>{
  e.preventDefault();
  joyActive = false;
  joyOuter.style.display = 'none';
  moveDir = {x:0, y:0};
}, {passive:false});

// Keyboard
const keys = {};
window.addEventListener('keydown', e=>{ keys[e.key]=true; });
window.addEventListener('keyup', e=>{ keys[e.key]=false; });

// ---- SKILL ACTIVATION ----
function activateSkill(slot) {
  if (!gameRunning) return;
  if (slot >= playerSkills.length) return;
  if (skillCooldowns[slot] > 0) return;
  const sk = playerSkills[slot];
  const def = SKILL_DEFS.find(d=>d.id===sk);
  if (!def) return;
  playSfx('skill');
  if (def.id==='speed') { player.speed = 6; setTimeout(()=>{player.speed=3.5;},def.dur); skillCooldowns[slot]=15000; }
  else if (def.id==='shield') { player.shielded=true; setTimeout(()=>{player.shielded=false;},def.dur); skillCooldowns[slot]=20000; showEvent('🛡 ЩИТ АКТИВЕН!'); }
  else if (def.id==='wave') {
    aiPlayers.forEach(ai=>{
      if (!ai.alive) return;
      const d=dist(player,ai);
      if (d<300) { const ang=Math.atan2(ai.y-player.y,ai.x-player.x); ai.vx+=Math.cos(ang)*8; ai.vy+=Math.sin(ang)*8; makeParticle(ai.x,ai.y,'#ff0',6,5); }
    });
    skillCooldowns[slot]=12000;
    showEvent('💥 ВОЛНА!');
  }
  else if (def.id==='tele') { player.x=rnd(200,MAP_W-200); player.y=rnd(200,MAP_H-200); makeParticle(player.x,player.y,'#8f0',12,6); skillCooldowns[slot]=18000; showEvent('🌀 ТЕЛЕПОРТ!'); }
  else if (def.id==='magnet') { player.magnetOn=true; setTimeout(()=>{player.magnetOn=false;},def.dur); skillCooldowns[slot]=15000; }
  updateSkillBar();
}
window.addEventListener('keydown', e=>{ if(e.key==='1')activateSkill(0); if(e.key==='2')activateSkill(1); if(e.key==='3')activateSkill(2); });

function updateSkillBar() {
  for(let i=0;i<3;i++) {
    const btn = document.getElementById('sk'+i);
    if (i<playerSkills.length) {
      const def = SKILL_DEFS.find(d=>d.id===playerSkills[i]);
      btn.textContent = def ? def.icon+' '+def.name.split(' ')[0] : '-';
      btn.className = 'skill-btn' + (skillCooldowns[i]>0 ? ' cooldown' : ' ready');
    } else {
      btn.textContent = '-';
      btn.className = 'skill-btn';
    }
  }
}

// ---- SKILL PICKER ----
function offerSkillPick() {
  if (playerSkills.length >= 3) return;
  pendingSkillPick = true;
  const available = SKILL_DEFS.filter(d=>!playerSkills.includes(d.id));
  const picks = [];
  while(picks.length<3 && available.length>0) {
    const i = Math.floor(Math.random()*available.length);
    picks.push(available.splice(i,1)[0]);
  }
  const container = document.getElementById('skill-choices');
  container.innerHTML = '';
  picks.forEach(sk=>{
    const d = document.createElement('div');
    d.className = 'skill-choice';
    d.innerHTML = `<h3>${sk.icon} ${sk.name}</h3><p>${sk.desc}</p>`;
    d.onclick = ()=>{ playerSkills.push(sk.id); hide('skillPicker'); pendingSkillPick=false; playSfx('levelup'); updateSkillBar(); };
    container.appendChild(d);
  });
  show('skillPicker');
}

// ---- EVENT BANNER ----
let eventBannerTimer = 0;
function showEvent(text) {
  const el = document.getElementById('eventBanner');
  document.getElementById('eventText').textContent = text;
  el.classList.add('show');
  clearTimeout(eventBannerTimer);
  eventBannerTimer = setTimeout(()=>el.classList.remove('show'),2500);
}

// ---- LEADERBOARD ----
function getLeaderboard() {
  const all = [{name:'ТЫ', mass:player.mass, isPlayer:true, isBoss:false}, ...aiPlayers.filter(a=>a.alive).map(a=>({name:a.name,mass:a.mass,isPlayer:false,isBoss:a.isBoss}))];
  return all.sort((a,b)=>b.mass-a.mass).slice(0,8);
}

// ---- UPDATE ----
let lastTime = 0;
function update(ts) {
  if (!gameRunning) return;
  const dt = Math.min(ts - lastTime, 50);
  lastTime = ts;
  gameTime += dt;
  bossTimer += dt;
  eventTimer -= dt;
  comboTimer -= dt;
  if (comboTimer <= 0) comboCount = 0;

  // Cooldowns
  for(let i=0;i<3;i++) { if(skillCooldowns[i]>0) { skillCooldowns[i]-=dt; if(skillCooldowns[i]<=0){skillCooldowns[i]=0; updateSkillBar();} } }

  // Keyboard dir
  if (!joyActive) {
    let kx=0,ky=0;
    if(keys['ArrowLeft']||keys['a'])kx=-1;
    if(keys['ArrowRight']||keys['d'])kx=1;
    if(keys['ArrowUp']||keys['w'])ky=-1;
    if(keys['ArrowDown']||keys['s'])ky=1;
    const kl=Math.hypot(kx,ky);
    if(kl>0){kx/=kl;ky/=kl;}
    moveDir={x:kx,y:ky};
  }

  if (!pendingSkillPick) {
    // Move player
    const pr = radiusFromMass(player.mass);
    const spd = player.speed * (activeBonus==='speed'?1.6:1) * Math.max(0.3, 1 - (pr-16)/200);
    player.x = Math.max(pr, Math.min(MAP_W-pr, player.x + moveDir.x*spd));
    player.y = Math.max(pr, Math.min(MAP_H-pr, player.y + moveDir.y*spd));
    if (Math.abs(moveDir.x)>0.05||Math.abs(moveDir.y)>0.05) player.angle += spd*0.04;
    player.eatingScale += (1-player.eatingScale)*0.2;

    // Magnet pull dots
    if (player.magnetOn || activeBonus==='magnet') {
      dots.forEach(dot=>{
        const d=dist(player,dot), range=200;
        if(d<range&&d>1) { dot.x+=(player.x-dot.x)/d*5; dot.y+=(player.y-dot.y)/d*5; }
      });
    }

    // Player eats dots
    for(let i=dots.length-1;i>=0;i--) {
      const dot=dots[i];
      if(dist(player,dot)<radiusFromMass(player.mass)+dot.r) {
        player.mass += dot.r*0.04;
        player.dotsEaten++;
        player.eatingScale=1.25;
        makeParticle(dot.x,dot.y,dot.color,4,3);
        playSfx('eat');
        dots.splice(i,1);
        spawnDot();
        // combo
        comboCount++;
        comboTimer=2000;
        if(comboCount>=3) { showCombo(comboCount); }
        if(player.dotsEaten%10===0 && playerSkills.length<3) offerSkillPick();
      }
    }

    // Player eats bonuses
    for(let i=bonuses.length-1;i>=0;i--) {
      const b=bonuses[i];
      if(dist(player,b)<radiusFromMass(player.mass)+b.r+8) {
        activeBonus=b.type; activeBonusName=b.name;
        activeBonusTimer=6000;
        if(b.type==='rainbow') player.rainbow=true;
        if(b.type==='ghost') player.ghost=true;
        makeParticle(b.x,b.y,b.color,10,5);
        playSfx('bonus');
        showEvent(b.icon+' '+b.name+'!');
        bonuses.splice(i,1);
        setTimeout(()=>spawnBonus(),5000);
      }
    }
    if(activeBonusTimer>0) {
      activeBonusTimer-=dt;
      if(activeBonusTimer<=0) {
        activeBonus=null; player.rainbow=false; player.ghost=false;
        document.getElementById('hud-active-bonus').style.display='none';
      } else {
        document.getElementById('hud-active-bonus').style.display='flex';
        document.getElementById('active-bonus-text').textContent = BONUS_TYPES.find(b=>b.id===activeBonus)?.icon+' '+Math.ceil(activeBonusTimer/1000)+'s';
      }
    }

    // Player vs AI
    if (!player.ghost && !player.shielded) {
      for(let i=aiPlayers.length-1;i>=0;i--) {
        const ai=aiPlayers[i];
        if(!ai.alive) continue;
        const d=dist(player,ai);
        const pr2=radiusFromMass(player.mass), ar=radiusFromMass(ai.mass);
        if(d<pr2+ar-Math.min(pr2,ar)*0.5) {
          if(player.mass>ai.mass*1.1) {
            // eat AI
            player.mass+=ai.mass*0.5;
            player.aiEaten++;
            player.eatingScale=1.35;
            makeParticle(ai.x,ai.y,ai.color,15,6);
            playSfx('eatAI');
            ai.alive=false;
            comboCount+=2; comboTimer=3000;
            if(comboCount>=3) showCombo(comboCount);
            if(player.aiEaten%3===0 && playerSkills.length<3) offerSkillPick();
            // respawn
            setTimeout(()=>{ ai.x=rnd(100,MAP_W-100);ai.y=rnd(100,MAP_H-100); ai.mass=rnd(0.3,2); ai.alive=true; },4000);
          } else if(ai.mass>player.mass*1.1) {
            // player dies
            if(!player.shielded) { killPlayer(); return; }
          }
        }
      }
    }
    // Slow decay for large players
    if(player.mass>5) player.mass-=0.0003*dt*(player.mass-5)*0.01;
    player.mass=Math.max(0.5,player.mass);
  }

  // ---- AI UPDATE ----
  aiPlayers.forEach((ai,idx)=>{
    if(!ai.alive) return;
    ai.thinkTimer-=dt;
    if(ai.thinkTimer<=0) {
      ai.thinkTimer = rnd(500,2000);
      // AI logic: flee from bigger, hunt smaller
      const threats = aiPlayers.filter(o=>o!==ai&&o.alive&&o.mass>ai.mass*1.2);
      const prey = aiPlayers.filter(o=>o!==ai&&o.alive&&o.mass<ai.mass*0.8);
      const preyPlayer = !player.ghost && player.alive && player.mass<ai.mass*0.8;
      if(threats.length>0&&Math.random()<0.7) {
        const t=threats[0]; const ang=Math.atan2(ai.y-t.y,ai.x-t.x);
        ai.targetX=ai.x+Math.cos(ang)*400; ai.targetY=ai.y+Math.sin(ang)*400;
      } else if(preyPlayer&&Math.random()<0.5) { ai.targetX=player.x; ai.targetY=player.y; }
      else if(prey.length>0&&Math.random()<0.5) { ai.targetX=prey[0].x; ai.targetY=prey[0].y; }
      else { ai.targetX=rnd(100,MAP_W-100); ai.targetY=rnd(100,MAP_H-100); }
    }
    const tdx=ai.targetX-ai.x, tdy=ai.targetY-ai.y, td=Math.hypot(tdx,tdy);
    if(td>5) {
      const spd=(ai.isBoss?2.2:2.8)*Math.max(0.3,1-(radiusFromMass(ai.mass)-16)/180);
      ai.vx=ai.vx*0.85+(tdx/td)*spd*0.15*12;
      ai.vy=ai.vy*0.85+(tdy/td)*spd*0.15*12;
    }
    const vmag=Math.hypot(ai.vx,ai.vy), maxV=ai.isBoss?2.2:2.8;
    if(vmag>maxV){ai.vx=ai.vx/vmag*maxV;ai.vy=ai.vy/vmag*maxV;}
    const ar=radiusFromMass(ai.mass);
    ai.x=Math.max(ar,Math.min(MAP_W-ar,ai.x+ai.vx));
    ai.y=Math.max(ar,Math.min(MAP_H-ar,ai.y+ai.vy));
    if(vmag>0.1) ai.angle+=vmag*0.04;
    ai.eatingScale+=(1-ai.eatingScale)*0.2;

    // AI eats dots
    for(let i=dots.length-1;i>=0;i--) {
      const dot=dots[i];
      if(dist(ai,dot)<ar+dot.r) {
        ai.mass+=dot.r*0.04; ai.eatingScale=1.2;
        dots.splice(i,1); spawnDot();
      }
    }
    // AI eats AI
    aiPlayers.forEach(ai2=>{
      if(ai2===ai||!ai2.alive) return;
      const d2=dist(ai,ai2), ar2=radiusFromMass(ai2.mass);
      if(d2<ar+ar2-Math.min(ar,ar2)*0.5&&ai.mass>ai2.mass*1.1) {
        ai.mass+=ai2.mass*0.4; ai.eatingScale=1.3;
        makeParticle(ai2.x,ai2.y,ai2.color,8,4);
        ai2.alive=false;
        setTimeout(()=>{ ai2.x=rnd(100,MAP_W-100);ai2.y=rnd(100,MAP_H-100);ai2.mass=rnd(0.3,2);ai2.alive=true; },5000);
      }
    });
    // Slow decay for big AI
    if(ai.mass>8) ai.mass-=0.0004*dt*(ai.mass-8)*0.01;
    ai.mass=Math.max(0.3,ai.mass);
  });

  // Boss spawn
  if(bossTimer>50000) { bossTimer=0; playSfx('boss'); showEvent('👿 ПОЯВИЛСЯ БОСС!'); spawnAI(aiPlayers.length, true); }

  // Random event
  if(eventTimer<=0) {
    eventTimer=rnd(20,40)*1000;
    spawnMeteorite();
  }

  // Meteorites
  meteorites.forEach((m,i)=>{
    m.x+=m.vx*dt*0.06; m.y+=m.vy*dt*0.06; m.life-=dt*0.001;
    if(m.life<=0) { makeParticle(m.x,m.y,'#f80',12,6); meteorites.splice(i,1); }
  });

  // Particles
  particles.forEach((p,i)=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.1; p.vx*=0.95; p.life-=0.03;
    if(p.life<=0) particles.splice(i,1);
  });

  // Camera
  const tgX=player.x-W/2, tgY=player.y-H/2;
  cam.x+=(Math.max(0,Math.min(MAP_W-W,tgX))-cam.x)*0.1;
  cam.y+=(Math.max(0,Math.min(MAP_H-H,tgY))-cam.y)*0.1;

  // HUD
  const pr=radiusFromMass(player.mass);
  document.getElementById('hud-size').textContent=(player.mass).toFixed(1);
  document.getElementById('hud-dots').textContent=player.dotsEaten;
  document.getElementById('hud-time').textContent=Math.floor(gameTime/1000)+'s';
  const lb=getLeaderboard();
  const myRank=lb.findIndex(e=>e.isPlayer)+1;
  document.getElementById('hud-rank').textContent='#'+myRank;
  updateSkillBar();
}

function spawnMeteorite() {
  playSfx('meteor');
  showEvent('☄ МЕТЕОРИТНЫЙ ДОЖДЬ!');
  for(let i=0;i<12;i++) {
    const ang=Math.random()*Math.PI*2;
    meteorites.push({
      x: rnd(200,MAP_W-200), y: rnd(200,MAP_H-200),
      vx: Math.cos(ang)*2, vy: Math.sin(ang)*3+2,
      r: rnd(10,22), life:1
    });
  }
}

function showCombo(n) {
  const el=document.getElementById('combo-text');
  el.textContent='COMBO ×'+n+'!';
  const ct=document.getElementById('combo-display');
  ct.querySelector('.combo-text').classList.add('show');
  playSfx('combo');
  clearTimeout(window._comboHide);
  window._comboHide=setTimeout(()=>ct.querySelector('.combo-text').classList.remove('show'),1500);
}

function killPlayer() {
  playSfx('die');
  makeParticle(player.x,player.y,player.color,30,8);
  player.alive=false;
  gameRunning=false;
  stopMusic();
  setTimeout(()=>{
    hide('hud');
    show('deathScreen');
    document.getElementById('deathStats').innerHTML =
      '⚽ Масса: <b>'+player.mass.toFixed(1)+'</b><br>' +
      '🍬 Шариков: <b>'+player.dotsEaten+'</b><br>' +
      '💀 AI съедено: <b>'+player.aiEaten+'</b><br>' +
      '⏱ Время: <b>'+Math.floor(gameTime/1000)+'s</b>';
  },1200);
}

// ---- DRAW ----
function drawBall(cx, cy, r, emoji, color, angle, eatingScale, isShielded, isGhost, isRainbow, eatScale=1) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(eatScale, eatScale);
  ctx.globalAlpha = isGhost ? 0.4 : 1;

  // Shadow
  ctx.shadowColor='rgba(0,0,0,0.4)';
  ctx.shadowBlur=12;

  // Body
  if (isRainbow) {
    const grad = ctx.createRadialGradient(0,0,0,0,0,r);
    const t = Date.now()*0.003;
    grad.addColorStop(0,`hsl(${(t*100)%360},80%,70%)`);
    grad.addColorStop(0.5,`hsl(${(t*100+120)%360},80%,60%)`);
    grad.addColorStop(1,`hsl(${(t*100+240)%360},80%,50%)`);
    ctx.fillStyle=grad;
  } else {
    const grad = ctx.createRadialGradient(-r*0.25,-r*0.25,0,0,0,r);
    grad.addColorStop(0,'rgba(255,255,255,0.5)');
    grad.addColorStop(0.4,color);
    grad.addColorStop(1,shadeColor(color,-40));
    ctx.fillStyle=grad;
  }
  ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill();

  // Rolling stripe
  ctx.save();
  ctx.clip(); ctx.rotate(angle);
  ctx.globalAlpha=0.15;
  for(let i=-3;i<=3;i++) {
    ctx.fillStyle='rgba(255,255,255,0.6)';
    ctx.beginPath();
    ctx.rect(-r,-r+i*(r*0.65),r*2,r*0.32);
    ctx.fill();
  }
  ctx.restore();
  ctx.shadowBlur=0;

  // Emoji face
  ctx.font = `${r*1.1}px serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.globalAlpha = isGhost ? 0.5 : 1;
  ctx.fillText(emoji, 0, 0);

  // Shield ring
  if (isShielded) {
    ctx.globalAlpha=0.7;
    ctx.strokeStyle='#4af';
    ctx.lineWidth=3;
    ctx.beginPath();
    ctx.arc(0,0,r+5+Math.sin(Date.now()*0.005)*3,0,Math.PI*2);
    ctx.stroke();
    ctx.globalAlpha=0.15;
    ctx.fillStyle='#4af';
    ctx.beginPath(); ctx.arc(0,0,r+8,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

function shadeColor(hex, pct) {
  let r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  r=Math.max(0,Math.min(255,r+pct)); g=Math.max(0,Math.min(255,g+pct)); b=Math.max(0,Math.min(255,b+pct));
  return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

function draw() {
  ctx.clearRect(0,0,W,H);

  // BG
  const bgGrad=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H));
  bgGrad.addColorStop(0,'#1a2040'); bgGrad.addColorStop(1,'#0a0a1a');
  ctx.fillStyle=bgGrad; ctx.fillRect(0,0,W,H);

  ctx.save(); ctx.translate(-cam.x, -cam.y);

  // Map border
  ctx.strokeStyle='rgba(100,150,255,0.3)'; ctx.lineWidth=6;
  ctx.strokeRect(0,0,MAP_W,MAP_H);
  ctx.strokeStyle='rgba(100,150,255,0.08)'; ctx.lineWidth=1;
  for(let x=0;x<MAP_W;x+=160){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,MAP_H);ctx.stroke();}
  for(let y=0;y<MAP_H;y+=160){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(MAP_W,y);ctx.stroke();}

  // Dots
  const t=Date.now()*0.003;
  dots.forEach(dot=>{
    dot.pulse+=0.05;
    const pr2=dot.r*(1+Math.sin(dot.pulse)*0.15);
    ctx.shadowColor=dot.color; ctx.shadowBlur=8;
    ctx.fillStyle=dot.color;
    ctx.beginPath(); ctx.arc(dot.x,dot.y,pr2,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
  });

  // Bonuses
  bonuses.forEach(b=>{
    b.pulse+=0.04;
    const bsc=1+Math.sin(b.pulse)*0.12;
    ctx.save(); ctx.translate(b.x,b.y); ctx.scale(bsc,bsc);
    ctx.shadowColor=b.color; ctx.shadowBlur=18;
    ctx.fillStyle=b.color+'55';
    ctx.beginPath(); ctx.arc(0,0,b.r+4,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    ctx.font='22px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(b.icon,0,0);
    ctx.restore();
  });

  // Meteorites
  meteorites.forEach(m=>{
    ctx.save(); ctx.globalAlpha=Math.min(1,m.life*2);
    ctx.shadowColor='#f80'; ctx.shadowBlur=15;
    ctx.fillStyle='#f44';
    ctx.beginPath(); ctx.arc(m.x,m.y,m.r,0,Math.PI*2); ctx.fill();
    ctx.font=(m.r*1.4)+'px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('☄',m.x,m.y);
    ctx.shadowBlur=0; ctx.restore();
    // Damage
    if(gameRunning&&!player.ghost&&!player.shielded&&player.alive) {
      if(dist(player,{x:m.x,y:m.y})<radiusFromMass(player.mass)+m.r) { killPlayer(); }
    }
  });

  // AI players
  aiPlayers.forEach(ai=>{
    if(!ai.alive) return;
    const ar=radiusFromMass(ai.mass)*ai.eatingScale;
    drawBall(ai.x,ai.y,ar,ai.emoji,ai.color,ai.angle,ai.eatingScale,false,false,false,ai.eatingScale);
    // Name tag
    ctx.fillStyle=ai.isBoss?'#f44':'rgba(255,255,255,0.85)';
    ctx.font='bold '+Math.max(11,Math.min(16,ar*0.55))+'px sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='top';
    ctx.fillText(ai.name, ai.x, ai.y+ar+4);
    // Mass
    ctx.fillStyle='rgba(255,255,255,0.6)';
    ctx.font=Math.max(10,ar*0.45)+'px sans-serif';
    ctx.fillText(ai.mass.toFixed(1), ai.x, ai.y+ar+18);
  });

  // Player
  if(player.alive) {
    const pr=radiusFromMass(player.mass)*player.eatingScale;
    drawBall(player.x,player.y,pr,player.emoji,player.color,player.angle,player.eatingScale,player.shielded,player.ghost,player.rainbow,player.eatingScale);
    // Name
    ctx.fillStyle='#fff';
    ctx.font='bold '+Math.max(12,Math.min(18,pr*0.5))+'px sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='top';
    ctx.fillText('ТЫ', player.x, player.y+pr+4);
  }

  // Particles
  particles.forEach(p=>{
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;

  ctx.restore();

  // Leaderboard
  drawLeaderboard();
}

function drawLeaderboard() {
  const lb=getLeaderboard();
  const x=W-160, y=10, lh=22, pw=150, bh=10+lb.length*lh;
  ctx.fillStyle='rgba(0,0,0,0.5)';
  ctx.beginPath(); ctx.roundRect(x-4,y,pw,bh+8,8); ctx.fill();
  lb.forEach((e,i)=>{
    const iy=y+8+i*lh;
    ctx.font=(e.isPlayer?'bold ':'')+'12px sans-serif';
    ctx.fillStyle=e.isBoss?'#f44':(e.isPlayer?'#4af':'#ccc');
    const txt=`${i+1}. ${e.name.length>9?e.name.slice(0,9)+'…':e.name} ${e.mass.toFixed(1)}`;
    ctx.fillText(txt,x,iy);
  });
}

// ---- GAME LOOP ----
function loop(ts) {
  update(ts);
  draw();
  requestAnimationFrame(loop);
}

function startGame() {
  hide('menuScreen'); hide('deathScreen'); hide('settingsScreen'); hide('skillPicker');
  show('hud');
  initGame();
  startMusic();
  requestAnimationFrame(ts=>{lastTime=ts;loop(ts);});
}

function stopGame() {
  gameRunning=false;
  stopMusic();
}

requestAnimationFrame(ts=>{lastTime=ts;loop(ts);});
</script>
</body>
</html>
